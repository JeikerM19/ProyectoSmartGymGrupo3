
services:
  # Servicio de la Base de Datos
  db:
    image: postgres:15
    container_name: smartgym_db
    restart: always
    # Docker leerá las credenciales directamente de tu archivo .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servicio de tu API en Python
  app:
    build: .
    container_name: smartgym_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Esto asegura que la API no intente arrancar hasta que la DB esté lista
    depends_on:
      - db

volumes:
  postgres_data: